name: analyse

on:
  push:
    branches:
      - '*.x'
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: "ubuntu-latest"
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      matrix:
        php: [8.3]
        experimental:
          - false

    name: PHP:${{ matrix.php }} Code Analysis

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, sqlite3, pdo_sqlite, bcmath, fileinfo
          coverage: none

      - name: Set package version
        run: composer config version "1.1.x-dev"

      - name: Install dependencies
        uses: ramsey/composer-install@v4
        with:
          dependency-versions: "highest"
          composer-options: "--prefer-dist --no-cache"

      - name: Installed dependencies
        run: composer show -D

      - name: Execute Code Style Analysis
        run: vendor/bin/pint --test

      - name: Execute Static Code Analysis
        run: vendor/bin/phpstan analyse --verbose
