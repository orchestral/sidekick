name: integration tests


on:
  push:
    branches:
      - '*.x'
  pull_request:
  workflow_dispatch:

jobs:
  laravel-tests:
    runs-on: "ubuntu-latest"
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      matrix:
        dependencies:
          - "highest"
          - "lowest"
        laravel:
          - 13
          - 12
          - 11
          - 10
          - 9
        experimental:
          - false
        include:
          - laravel: 13
            php: 8.3
          - laravel: 12
            php: 8.2
          - laravel: 11
            php: 8.2
          - laravel: 10
            php: 8.1
          - laravel: 9
            php: '8.0'

    name: Laravel:${{ matrix.laravel }} / PHP:${{ matrix.php }} ${{ matrix.dependencies == 'highest' && '⬆️' || '⬇️' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, mysql, mysqli, pdo_mysql, bcmath, intl, fileinfo
          coverage: none

      - name: Install dependencies
        uses: "ramsey/composer-install@v3"
        with:
          dependency-versions: "${{ matrix.dependencies }}"
          composer-options: "--prefer-dist --no-cache --with=laravel/framework:^${{ matrix.laravel }}"

      - name: Installed dependencies
        run: composer show -D

      - name: Execute tests
        run: |
          vendor/bin/pest

  phpunit-tests:
    runs-on: "ubuntu-latest"
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      matrix:
        dependencies:
          - "highest"
          - "lowest"
        phpunit:
          - '~12.0.0'
          - '^11.0'
          - '^10.0'
          - '^9.6'
        experimental:
          - false
        include:
          - phpunit: '~12.0.0'
            php: 8.3
          - phpunit: '^11.0'
            php: 8.2
          - phpunit: '^10.0'
            php: 8.1
          - phpunit: '^9.6'
            php: '8.0'

    name: PHPUnit:${{ matrix.phpunit }} / PHP:${{ matrix.php }} ${{ matrix.dependencies == 'highest' && '⬆️' || '⬇️' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, mysql, mysqli, pdo_mysql, bcmath, intl, fileinfo
          coverage: none

      - name: Install PHPUnit
        run: |
          composer require --dev "phpunit/phpunit:${{ matrix.phpunit }}" --no-install

      - name: Install dependencies
        uses: "ramsey/composer-install@v3"
        with:
          dependency-versions: "${{ matrix.dependencies }}"
          composer-options: "--prefer-dist --no-cache"

      - name: Installed dependencies
        run: composer show -D

      - name: Execute tests
        run: |
          vendor/bin/pest
