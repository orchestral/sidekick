name: integration tests

on:
  push:
    branches:
      - '*.x'
  pull_request:
  workflow_dispatch:

jobs:
  laravel-tests:
    runs-on: "ubuntu-latest"
    continue-on-error: false
    strategy:
      matrix:
        dependencies:
          - "highest"
          - "lowest"
        laravel:
          - 13
          - 12
          - 11
          - 10
          - 9
        php:
          - 8.5
          - 8.4
          - 8.3
          - 8.2
          - 8.1
        exclude:
          - laravel: 13
            php: 8.2
          - laravel: 13
            php: 8.1
          - laravel: 12
            php: 8.1
          - laravel: 11
            php: 8.5
          - laravel: 11
            php: 8.1
          - laravel: 10
            php: 8.5
          - laravel: 10
            php: 8.4
          - laravel: 10
            php: 8.5
          - laravel: 10
            php: 8.4
          - laravel: 10
            php: 8.3

    name: Laravel:${{ matrix.laravel }} / PHP:${{ matrix.php }} ${{ matrix.dependencies == 'highest' && '⬆️' || '⬇️' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, mysql, mysqli, pdo_mysql, bcmath, intl, fileinfo
          coverage: none

      - name: Set package version
        run: composer config version ${{ matrix.laravel >= 13 && '1.2.x-dev' || '1.1.x-dev' }}

      - name: Install dependencies
        uses: ramsey/composer-install@v4
        with:
          dependency-versions: "${{ matrix.dependencies }}"
          composer-options: "--prefer-dist --no-cache --with=laravel/framework:^${{ matrix.laravel }}"

      - name: Installed dependencies
        run: composer show -D

      - name: Update PHPUnit Configuration
        run: |
          vendor/bin/phpunit --migrate-configuration
        if: matrix.php >= 8.1
        continue-on-error: true

      - name: Execute tests
        run: |
          vendor/bin/phpunit --no-coverage --no-configuration --bootstrap vendor/autoload.php --color tests

  phpunit-tests:
    runs-on: "ubuntu-latest"
    continue-on-error: false
    strategy:
      matrix:
        dependencies:
          - "highest"
          - "lowest"
        phpunit:
          - '^13.0'
          - '^12.0'
          - '^11.0'
          - '^10.0'
        php:
          - 8.5
          - 8.4
          - 8.3
          - 8.2
          - 8.1
        exclude:
          - phpunit: '^13.0'
            php: 8.3
          - phpunit: '^13.0'
            php: 8.2
          - phpunit: '^13.0'
            php: 8.1
          - phpunit: '^12.0'
            php: 8.2
          - phpunit: '^12.0'
            php: 8.1
          - phpunit: '^11.0'
            php: 8.1

    name: PHPUnit:${{ matrix.phpunit }} / PHP:${{ matrix.php }} ${{ matrix.dependencies == 'highest' && '⬆️' || '⬇️' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, mysql, mysqli, pdo_mysql, bcmath, intl, fileinfo
          coverage: none

      - name: Set package version
        run: composer config version "1.2.x-dev"

      - name: Install dependencies
        uses: ramsey/composer-install@v4
        with:
          dependency-versions: "${{ matrix.dependencies }}"
          composer-options: "--prefer-dist --no-cache --with=phpunit/phpunit:${{ matrix.phpunit }}"

      - name: Installed dependencies
        run: composer show -D

      - name: Execute tests
        run: |
          vendor/bin/phpunit --no-coverage --no-configuration --bootstrap vendor/autoload.php --color tests
